<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Workspace | Xelviora</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="css/register.css?v=1">

</head>

<body>

<div class="register-page">

    <div class="register-card">

        <div class="step-indicator">

            <div class="step active">1</div>

            <div class="line"></div>

            <div class="step">2</div>

            <div class="line"></div>

            <div class="step">3</div>

            <div class="line"></div>

            <div class="step">4</div>

        </div>

        <h1 id="formTitle">Create Your Workspace</h1>

<p id="stepText">

    Step 1 of 4 — Company Details

</p>

<form id="companyForm">

<div class="step-content active" id="step1">

    <input
type="text"
id="companyName"
placeholder="Company Name">

    <input
type="email"
id="businessEmail"
placeholder="Business Email">

    <select id="country" required>

        <option value="">Select Country</option>

        <option>United Kingdom</option>

        <option>India</option>

        <option>United States</option>

        <option>Australia</option>

        <option>Canada</option>

    </select>

    <select id="industry" required>

        <option value="">Select Industry</option>

        <option>Pharmaceutical</option>

        <option>Healthcare</option>

        <option>Technology</option>

        <option>Finance</option>

        <option>Manufacturing</option>

    </select>

    <select id="companySize" required>

        <option value="">Company Size</option>

        <option>1–10 Employees</option>

        <option>11–50 Employees</option>

        <option>51–250 Employees</option>

        <option>251–1000 Employees</option>

        <option>1000+ Employees</option>

    </select>

    <input type="tel" 
        id="phone"
        placeholder="Business Phone">

    <input type="url" 
        id="website"
        placeholder="Company Website (Optional)">

</div>

<div class="step-content" id="step2">

    <input type="text" 
        id="adminName"
        placeholder="Administrator Name">

    <input type="text" 
        id="jobTitle"
        placeholder="Job Title">

    <input type="email" 
        id="adminEmail"
        placeholder="Administrator Email">

    <input type="password" 
        id="password"
        placeholder="Password">

    <input type="password" 
        id="confirmPassword"
        placeholder="Confirm Password">

</div>

<div class="step-content" id="step3">

    <input type="text" 
        id="timezone"
        placeholder="Time Zone">

    <input type="text" 
        id="currency"
        placeholder="Currency">

    <input type="text" 
        id="language"
        placeholder="Language">

    <div class="upload-box">

    <label for="companyLogo">

        Company Logo (Optional)

    </label>

    <input
        type="file"
        id="companyLogo"
        accept=".png,.jpg,.jpeg,.svg">

</div>
</div>

<div class="step-content" id="step4">

    <button
        type="button"
        class="review-btn"
        id="reviewBtn">

        Review Your Details

    </button>

    <div
        id="reviewSection"
        class="review-section">

        <h3>Company Information</h3>

        <div id="companyReview"></div>

        <h3>Administrator</h3>

        <div id="adminReview"></div>

        <h3>Workspace</h3>

        <div id="workspaceReview"></div>

    </div>

</div>

<button type="button" id="continueBtn">

    Continue →

</button>

</form>
    </div>

</div>
<script src="js/register.js"></script>

</body>

</html>
